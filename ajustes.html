
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <title>Tech Pay - Ajustes Pro</title>
    <style>
        :root { 
            --primary: #22c55e; 
            --bg: #000;
            --card: rgba(17, 24, 39, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: #9CA3AF;
        }
        
        body { 
            margin:0; font-family:'Inter',sans-serif; background: var(--bg); color: #fff; 
            padding: 20px; padding-bottom: 120px; min-height: 100vh;
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .header { margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 10px; cursor: pointer; display: flex; backdrop-filter: blur(10px); }

        .profile-card { 
            background: var(--card); padding: 20px; border-radius: 24px; display: flex; 
            align-items: center; gap: 15px; border: 1px solid var(--border); backdrop-filter: blur(10px); margin-bottom: 25px;
        }
        .avatar { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; font-weight: 800; }

        .section-title { font-size: 12px; color: var(--text-secondary); margin: 25px 0 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        /* AREA DO SELETOR */
        .picker-container { 
            background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border);
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        
        #wheelPicker { margin: 10px 0; }

        .color-info { font-size: 14px; font-weight: 700; color: var(--primary); background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 10px; }

        .bg-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); text-align: center; }
        
        .btn-action { width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; margin-bottom: 10px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; color: #ef4444; border: 1px solid #ef4444; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 10, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0 30px; backdrop-filter: blur(15px); }
        .nav-item { text-decoration: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; }
        .nav-item.active { color: #fff; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h2 style="margin:0; font-size: 18px;">Personalizar</h2>
</div>

<div class="profile-card">
    <div class="avatar" id="avatar-icon">L</div>
    <div>
        <b style="font-size: 18px;">Leonardo</b>
        <p style="margin:0; font-size: 12px; color: var(--text-secondary);">Identidade Visual</p>
    </div>
</div>

<div class="section-title">Escolha sua cor (Deslize)</div>
<div class="picker-container">
    <div id="wheelPicker"></div>
    <div class="color-info" id="hex-label">#22c55e</div>
    <p style="font-size: 11px; color: var(--text-secondary); text-align: center;">Toque e deslize no círculo para definir o tom do seu Tech Pay</p>
</div>

<div class="section-title">Wallpaper de Fundo</div>
<div class="bg-card">
    <input type="file" id="up-foto" accept="image/*" style="display:none" onchange="uploadFoto(this)">
    <button class="btn-action btn-main" id="btn-wall" onclick="document.getElementById('up-foto').click()">Trocar Imagem</button>
    <button class="btn-action btn-outline" onclick="resetarTudo()">Resetar Tudo</button>
</div>

<nav class="bottom-nav">
    <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span>Início</span>
    </a>
    <a href="metas.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle></svg>
        <span>Metas</span>
    </a>
    <a href="ajustes.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Ajustes</span>
    </a>
</nav>

<script>
    // Inicializar o Seletor de Cores (Círculo)
    var colorPicker = new iro.ColorPicker("#wheelPicker", {
        width: 220,
        color: localStorage.getItem("cor_primaria") || "#22c55e",
        layout: [
            { component: iro.ui.Wheel }, // O círculo
            { component: iro.ui.Slider, options: { sliderType: 'value' } }, // Brilho (escuro/claro)
        ]
    });

    // Quando a cor mudar no seletor
    colorPicker.on('color:change', function(color) {
        const hex = color.hexString;
        mudarCor(hex);
    });

    function mudarCor(cor) {
        localStorage.setItem("cor_primaria", cor);
        document.documentElement.style.setProperty('--primary', cor);
        document.getElementById('avatar-icon').style.backgroundColor = cor;
        document.getElementById('hex-label').innerText = cor;
        document.getElementById('hex-label').style.color = cor;
        
        const btn = document.getElementById('btn-wall');
        if(btn) btn.style.backgroundColor = cor;
    }

    function uploadFoto(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = e.target.result;
            localStorage.setItem("user_bg", img);
            aplicarFundo(img);
        }
        reader.readAsDataURL(input.files[0]);
    }

    function aplicarFundo(img) {
        if(img) {
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url(${img})`;
        } else {
            document.body.style.backgroundImage = "none";
        }
    }

    function resetarTudo() {
        if(confirm("Deseja voltar para o visual padrão?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => {
        const cor = localStorage.getItem("cor_primaria") || "#22c55e";
        mudarCor(cor);
        const foto = localStorage.getItem("user_bg");
        if(foto) aplicarFundo(foto);
    }
</script>
</body>
</html>

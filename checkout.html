<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRY- Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #22C55E;
  --bg: radial-gradient(circle at 20% 0%, #0f172a, #000 70%);
  --card: rgba(18,24,38,0.95);
  --border: rgba(255,255,255,0.05);
  --text-sec: #9CA3AF;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: var(--bg);
  color:white;
  padding:20px;
}

.card {
  background: var(--card);
  border-radius:25px;
  padding:25px;
  margin-bottom:20px;
}

.input-group {
  margin-bottom:20px;
}

.input-group input, select {
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

.btn {
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  background:var(--primary);
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}

.comprovante {
  display:none;
  background: var(--card);
  border-radius:25px;
  padding:20px;
  text-align:center;
}

.linha {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}

.link {
  word-break: break-all;
  font-size:12px;
  color: var(--primary);
}

</style>
</head>

<body>

<h2>Checkout ZENTRY</h2>

<div class="card">
  <div class="input-group">
    <input id="valor" placeholder="R$ 0,00">
  </div>

  <div class="input-group">
    <input id="descricao" placeholder="Descrição">
  </div>

  <div class="input-group">
    <select id="metodo">
      <option value="pix">Pix</option>
      <option value="cartao">Cartão</option>
      <option value="boleto">Boleto</option>
    </select>
  </div>

  <button class="btn" onclick="pagar()">Pagar</button>
</div>

<div class="comprovante" id="comprovante">
  <h3>✅ Pagamento aprovado</h3>

  <div class="linha"><span>Valor</span><span id="c-valor"></span></div>
  <div class="linha"><span>Descrição</span><span id="c-desc"></span></div>
  <div class="linha"><span>Data</span><span id="c-data"></span></div>
  <div class="linha"><span>ID</span><span id="c-id"></span></div>

  <p class="link" id="c-link"></p>

  <button class="btn" onclick="copiar()">Copiar comprovante</button>
</div>
  <script type="module">
    import { db, auth, ZentryAuth } from './zentry-core.js';
    import { doc, updateDoc, increment, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // MASCARA DE MOEDA
    window.mascaraMoeda = (input) => {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        input.value = "R$ " + v;
    };

    document.getElementById("valor").addEventListener("input", function() {
        mascaraMoeda(this);
    });

    // AO CARREGAR: PEGAR PARAMETROS DA URL
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const v = params.get("v");
        const d = params.get("d");

        if (v) {
            const valorFormatado = (parseInt(v) / 100).toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
            document.getElementById("valor").value = valorFormatado;
        }
        if (d) document.getElementById("descricao").value = d;
    };

    // FUNÇÃO PRINCIPAL DE PAGAMENTO
    window.pagar = async () => {
        const valorTexto = document.getElementById("valor").value;
        const desc = document.getElementById("descricao").value || "Venda via Checkout";
        
        if (!valorTexto || valorTexto === "R$ 0,00") {
            alert("Digite um valor válido");
            return;
        }

        // Converte "R$ 1.500,50" para o número 1500.50
        const valorLimpo = valorTexto.replace("R$", "").replace(/\./g, "").replace(",", ".");
        const valorNumero = parseFloat(valorLimpo);

        try {
            // 1. Verifica se o usuário está logado para receber o dinheiro
            const user = auth.currentUser;
            if (!user) {
                alert("Erro: Você precisa estar logado para processar vendas.");
                return;
            }

            const idTransacao = "ZNT" + Date.now();
            const dataAtual = new Date().toLocaleString('pt-BR');

            // 2. ATUALIZAÇÃO NO FIRESTORE (Saldo + Transação)
            const userRef = doc(db, "usuarios", user.uid);
            
            await updateDoc(userRef, {
                saldo: increment(valorNumero), // Soma o valor ao saldo atual
                transacoes: arrayUnion({
                    id: idTransacao,
                    valor: valorNumero,
                    descricao: desc,
                    tipo: "entrada",
                    metodo: document.getElementById("metodo").value,
                    data: dataAtual,
                    status: "concluido"
                })
            });

            // 3. MOSTRAR COMPROVANTE NA TELA
            document.getElementById("c-valor").innerText = valorTexto;
            document.getElementById("c-desc").innerText = desc;
            document.getElementById("c-data").innerText = dataAtual;
            document.getElementById("c-id").innerText = idTransacao;
            document.getElementById("comprovante").style.display = "block";

            console.log("Saldo atualizado no Firebase!");

        } catch (error) {
            console.error("Erro no processamento:", error);
            alert("Falha ao processar pagamento.");
        }
    };

    window.copiar = () => {
        const texto = `Comprovante ZENTRY\n\nValor: ${document.getElementById("c-valor").innerText}\nDescrição: ${document.getElementById("c-desc").innerText}\nID: ${document.getElementById("c-id").innerText}`;
        navigator.clipboard.writeText(texto);
        alert("Copiado com sucesso!");
    };
  </script>
  


</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Extrato - Zentry</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .header { margin-bottom: 30px; }
        #txtSaldo { font-size: 24px; font-weight: 700; color: #22c55e; margin-top: 5px; }
        .lista { display: flex; flex-direction: column; gap: 15px; }
        .item { background: #111; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; cursor: pointer; }
        .info b { display: block; font-size: 16px; }
        .info span { font-size: 12px; color: #666; }
        .val { font-weight: 700; }
        .pos { color: #22c55e; }
        .neg { color: #ef4444; }
    </style>
</head>
<body>

    <div class="header">
        <span>Seu saldo</span>
        <div id="txtSaldo">R$ 0,00</div>
    </div>

    <div id="listaExtrato" class="lista">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
            authDomain: "zentry-app-74275.firebaseapp.com",
            projectId: "zentry-app-74275",
            storageBucket: "zentry-app-74275.appspot.com",
            messagingSenderId: "571422826071",
            appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let transacoesCache = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "usuarios", user.uid), (ds) => {
                    if(ds.exists()) {
                        document.getElementById('txtSaldo').innerText = (ds.data().saldo || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                });

                onSnapshot(collection(db, "transacoes"), (snap) => {
                    transacoesCache = [];
                    snap.forEach(d => {
                        const t = d.data();
                        if (t.userId === user.uid || t.uidDestino === user.uid) {
                            transacoesCache.push({ id: d.id, ...t });
                        }
                    });
                    transacoesCache.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderizar();
                });
            } else { window.location.href = "login.html"; }
        });

        function renderizar() {
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = "";
            const me = auth.currentUser.uid;

            transacoesCache.forEach(t => {
                const souEuRecebendo = t.uidDestino === me || t.tipo === "entrada";
                let val = typeof t.valor === 'number' ? t.valor : parseFloat(String(t.valor).replace(/[^\d,.-]/g, '').replace(',', '.'));
                
                const itemHtml = `
                    <div class="item" onclick="abrirComprovante('${t.id}')">
                        <div class="info">
                            <b>${souEuRecebendo ? (t.nomeRemetente || "Recebido") : (t.nomeDestino || "Enviado")}</b>
                            <span>${t.data || 'Pix realizado'}</span>
                        </div>
                        <div class="val ${souEuRecebendo ? 'pos' : 'neg'}">
                            ${souEuRecebendo ? '+' : '-'} ${val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                        </div>
                    </div>`;
                lista.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        window.abrirComprovante = (id) => {
            const t = transacoesCache.find(x => x.id === id);
            if (t) {
                // Aqui está o segredo: limpamos o antigo e salvamos o NOVO clicado
                localStorage.setItem("comprovante_ativo", JSON.stringify(t));
                window.location.href = "comprovante.html";
            }
        };
    </script>
</body>
</html>

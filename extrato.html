<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrato - Zentry</title>
</head>
<body>
    <div id="txtSaldo">R$ 0,00</div>
    <div id="listaExtrato"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
            authDomain: "zentry-app-74275.firebaseapp.com",
            projectId: "zentry-app-74275",
            storageBucket: "zentry-app-74275.appspot.com",
            messagingSenderId: "571422826071",
            appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let transacoesCache = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 1. Monitora Saldo
                onSnapshot(doc(db, "usuarios", user.uid), (ds) => {
                    if(ds.exists()) {
                        const s = ds.data().saldo || 0;
                        document.getElementById('txtSaldo').innerText = s.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                });

                // 2. Monitora Transações
                onSnapshot(collection(db, "transacoes"), (snap) => {
                    transacoesCache = [];
                    snap.forEach(d => {
                        const t = d.data();
                        if (t.userId === user.uid || t.uidDestino === user.uid) {
                            transacoesCache.push({ id: d.id, ...t });
                        }
                    });

                    // Ordena por tempo (mais novo primeiro)
                    transacoesCache.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderizar();
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function renderizar() {
            const lista = document.getElementById('listaExtrato');
            if (!lista) return;
            lista.innerHTML = ""; 
            
            const me = auth.currentUser?.uid;

            transacoesCache.forEach(t => {
                const souEuRecebendo = t.uidDestino === me || t.tipo === "entrada";
                
                // Trata o valor para ser sempre número
                let val = 0;
                if (typeof t.valor === 'number') val = t.valor;
                else val = parseFloat(String(t.valor).replace(/[^\d,.-]/g, '').replace(',', '.'));

                const valorFormatado = (val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                const cor = souEuRecebendo ? 'pos' : 'neg';
                const sinal = souEuRecebendo ? '+' : '-';
                const nome = souEuRecebendo ? (t.nomeRemetente || "Pix Recebido") : (t.nomeDestino || "Pix Enviado");

                // CRUCIAL: O onclick usa o ID da transação
                const itemHtml = `
                    <div class="item" style="cursor:pointer" onclick="abrirComprovante('${t.id}')">
                        <div class="info">
                            <b>${nome}</b>
                            <span style="display:block; font-size:12px; color:gray">${t.data || 'Hoje'}</span>
                        </div>
                        <div class="val ${cor}" style="font-weight:bold">${sinal} ${valorFormatado}</div>
                    </div><hr>`;
                
                lista.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        // ESSA FUNÇÃO RESOLVE O ERRO DO VALOR TROCADO
        window.abrirComprovante = (id) => {
            const t = transacoesCache.find(x => x.id === id);
            if (t) {
                // LIMPA TUDO ANTES DE SALVAR O NOVO
                localStorage.removeItem("comprovante_ativo");
                localStorage.setItem("comprovante_ativo", JSON.stringify(t));
                window.location.href = "comprovante.html";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  height:100vh;
  overflow:hidden;
}

/* SPLASH */
.splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* FUNDO COM ZOOM */
.splash::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('splash.jpg') center/cover no-repeat;
  animation:zoom 4s ease forwards;
}

/* OVERLAY ESCURO PREMIUM */
.splash::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    rgba(0,0,0,0.4),
    rgba(0,0,0,0.8)
  );
}

/* LOGO */
.logo{
  position:relative;
  font-family:'Inter',sans-serif;
  font-size:52px;
  font-weight:700;
  letter-spacing:4px;
}

.white{
  color:#fff;
}

.green{
  color:#22c55e;
}

/* ANIMAÇÃO FUNDO */
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* FADE OUT */
.fade-out{
  animation:fadeOut 0.8s ease forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(1.05);
  }
}
</style>
</head>

<body>

<div class="splash" id="splash">
  <h1 class="logo">
    <span class="white">ZEN</span><span class="green">TRY</span>
  </h1>
</div>

<script>
// tempo na splash
setTimeout(()=>{
  document.getElementById("splash").classList.add("fade-out");

  setTimeout(()=>{
    window.location.href = "login.html";
  }, 800);

}, 2500);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<title>Zentap Pro</title>

<style>
:root{
--primary:#22c55e;
--bg:#060910;
--card:#0f1623;
--muted:#6b7a99;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'Sora',sans-serif;}

.screen{display:none;flex-direction:column;padding:20px;height:100vh;}
.screen.ativa{display:flex;animation:fade .3s;}

@keyframes fade{from{opacity:0;transform:translateY(10px)}}

.valor{font-size:48px;text-align:center;margin:40px 0;}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.key{
background:var(--card);
padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
}
.key:active{transform:scale(.9)}

.btn{
margin-top:20px;
padding:16px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#4ade80);
font-weight:700;
}

.metodo{
background:var(--card);
padding:16px;
border-radius:15px;
margin:10px 0;
display:flex;
align-items:center;
gap:10px;
}

.metodo img{width:30px;}

.btn-sec{
margin-top:10px;
padding:14px;
background:var(--primary);
border:none;
border-radius:15px;
color:#052e16;
font-weight:700;
}

.qr{
background:#fff;
padding:10px;
border-radius:20px;
margin:30px auto;
}

.proc{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
}

.spinner{
width:60px;
height:60px;
border:4px solid #222;
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.ok{
font-size:60px;
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- TELA VALOR -->
<div id="tela1" class="screen ativa">
<div class="valor" id="valor">R$ 0,00</div>

<div class="keypad">
<div class="key" onclick="dig(1)">1</div>
<div class="key" onclick="dig(2)">2</div>
<div class="key" onclick="dig(3)">3</div>
<div class="key" onclick="dig(4)">4</div>
<div class="key" onclick="dig(5)">5</div>
<div class="key" onclick="dig(6)">6</div>
<div class="key" onclick="dig(7)">7</div>
<div class="key" onclick="dig(8)">8</div>
<div class="key" onclick="dig(9)">9</div>
<div class="key" onclick="dig('00')">00</div>
<div class="key" onclick="dig(0)">0</div>
<div class="key" onclick="del()">⌫</div>
</div>

<button class="btn" onclick="ir(2)">Continuar</button>
</div>

<!-- MÉTODOS -->
<div id="tela2" class="screen">
<h2>Forma de pagamento</h2>

<div class="metodo" onclick="pix()">
<img src="https://i.imgur.com/8QfQ9Qp.png">
Pix
</div>

<div class="metodo" onclick="nfc('Débito')">
<img src="https://i.imgur.com/1Q9Z1Zm.png">
Débito
</div>

<div class="metodo" onclick="nfc('Crédito')">
<img src="https://i.imgur.com/1Q9Z1Zm.png">
Crédito
</div>

<button class="btn-sec" onclick="ir(1)">Voltar</button>
</div>

<!-- PIX -->
<div id="tela3" class="screen">
<h2>Pix</h2>

<div id="qrcode" class="qr"></div>

<button class="btn-sec" onclick="ir(2)">Voltar</button>
</div>

<!-- NFC -->
<div id="tela4" class="screen">
<h2 id="tipo"></h2>

<div style="font-size:80px;text-align:center;margin:50px 0;">📲</div>

<button class="btn" onclick="pagar()">Simular pagamento</button>
<button class="btn-sec" onclick="ir(2)">Voltar</button>
</div>

<!-- PROCESSANDO -->
<div id="tela5" class="screen">
<div class="proc">
<div class="spinner"></div>
<p>Processando...</p>
</div>
</div>

<!-- APROVADO -->
<div id="tela6" class="screen">
<div class="proc">
<div class="ok">✔</div>
<p>Pagamento aprovado</p>
</div>
</div>

<audio id="som" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-interface-beep-221.mp3"></audio>

<script>

let valor="";

function vibrar(x=50){
if(navigator.vibrate) navigator.vibrate(x);
}

function dig(n){
vibrar(30);
valor+=n;
atualiza();
}

function del(){
valor=valor.slice(0,-1);
atualiza();
}

function atualiza(){
let v=valor.padStart(3,'0');
let num=(parseInt(v)/100).toFixed(2);
document.getElementById("valor").innerText="R$ "+num.replace('.',',');
}

function ir(n){
document.querySelectorAll(".screen").forEach(e=>e.classList.remove("ativa"));
document.getElementById("tela"+n).classList.add("ativa");
}

function pix(){
ir(3);
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text:"pagamento"+Date.now(),
width:200,
height:200
});
}

function nfc(t){
document.getElementById("tipo").innerText=t;
ir(4);
}

async function pagar(){
vibrar(100);
ir(5);

await new Promise(r=>setTimeout(r,2000));

document.getElementById("som").play();
vibrar([100,50,100]);

ir(6);

await new Promise(r=>setTimeout(r,2000));

ir(1);
valor="";
atualiza();
}

</script>

</body>
</html>

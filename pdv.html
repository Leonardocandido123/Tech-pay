<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentap Pro - PDV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #F6F7F9;
            --card: #FFFFFF;
            --text-main: #1A1D23;
            --text-sec: #717680;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; width: 100vw; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* HEADER */
        .sub-header { 
            padding: 10px 20px; display: grid; grid-template-columns: 44px 1fr 44px; 
            align-items: center; background: #fff; border-bottom: 1px solid var(--border); height: 55px;
        }
        .back-btn { color: var(--primary); cursor: pointer; border: none; background: none; display: flex; align-items: center; }
        .back-btn svg { stroke: var(--primary); } /* Garante a seta verde */

        /* VALORES */
        .display-valor { flex: 1; display: flex; align-items: flex-start; justify-content: center; font-size: 64px; font-weight: 800; color: var(--text-main); letter-spacing: -2px; padding-top: 5vh; }
        .valor-gigante { font-size: 50px; font-weight: 800; text-align: center; padding: 15px 20px; color: var(--text-main); letter-spacing: -1px; }

        /* TECLADO */
        .bottom-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }
        .teclado-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 8px; }
        .key { height: 52px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; border-radius: 12px; }
        .btn-confirm { width: 100%; height: 58px; background: var(--primary); color: #000; border-radius: 16px; display: flex; align-items: center; justify-content: center; opacity: 0.15; pointer-events: none; border: none; font-weight: 800; font-size: 16px; }
        .btn-confirm.active { opacity: 1; pointer-events: all; }

        /* MODALIDADES */
        .center-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 25px; }
        .item-modalidade { 
            background: #fff; padding: 20px; border-radius: 18px; margin-bottom: 12px; 
            border: 2px solid var(--primary); 
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 17px; text-transform: uppercase;
        }

        /* TELA APROXIMAÇÃO (COMPACTA) */
        .tap-instruction { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .maquininha-svg { width: 110px; height: 110px; margin: 10px 0; }

        /* SEÇÃO DESTAQUE (HOME) */
        .destaque-header { margin: 20px 20px 10px; }
        .destaque-label { font-size: 14px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .destaque-line { height: 2px; background: var(--primary); width: 100%; margin-top: 5px; border-radius: 2px; }

        /* SUCESSO */
        .success-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .success-icon { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 35px; color: #000; }
    </style>
</head>
<body>

    <div id="screen-dash" class="screen active">
        <header class="sub-header" style="justify-content: space-between; display: flex;">
            <div style="font-weight: 800; color: var(--primary);">ZENTAP PRO</div>
            <div style="font-size: 20px;">⚙️</div>
        </header>
        
        <div style="padding: 20px;">
            <button onclick="nav('screen-teclado')" style="width: 100%; height: 100px; background: #fff; border: 2px solid var(--primary); border-radius: 24px; font-size: 20px; font-weight: 800; color: var(--text-main);">💸 VENDA RÁPIDA</button>
        </div>

        <div class="destaque-header">
            <span class="destaque-label">DESTAQUE</span>
            <div class="destaque-line"></div>
        </div>

        <div class="services-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px;">
            <div class="service-card" style="background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <div style="font-size: 22px;">🔗</div>
                <span style="font-size: 10px; font-weight: 700; text-align: center;">LINK DE<br>PAGAMENTO</span>
            </div>
            <div class="service-card" style="background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <div style="font-size: 22px;">👤</div>
                <span style="font-size: 10px; font-weight: 700; text-align: center;">NOVO<br>CLIENTE</span>
            </div>
            <div class="service-card" style="background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <div style="font-size: 22px;">📊</div>
                <span style="font-size: 10px; font-weight: 700; text-align: center;">EXTRATO<br>VENDAS</span>
            </div>
        </div>
    </div>

    <div id="screen-teclado" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-dash')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span style="font-weight:700; text-align:center;">VALOR</span>
            <div></div>
        </div>
        <div class="display-valor" id="display">R$ 0,00</div>
        <div class="bottom-container">
            <div class="teclado-grid">
                <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
                <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
                <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
                <div class="key" onclick="press('00')">00</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="limpar()">⌫</div>
            </div>
            <button class="btn-confirm" id="btnProximo" onclick="confirmarValor()">PRÓXIMO</button>
        </div>
    </div>

    <div id="screen-modal" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-teclado')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span style="font-weight:700;">MÉTODO</span>
            <div></div>
        </div>
        <div class="valor-gigante" id="valorFinal">R$ 0,00</div>
        <div class="center-container">
            <div class="item-modalidade" onclick="prepararVenda('Pix')">Pix</div>
            <div class="item-modalidade" onclick="prepararVenda('Débito')">Débito</div>
            <div class="item-modalidade" onclick="nav('screen-credito-tipo')">Crédito</div>
        </div>
    </div>

    <div id="screen-aproximar" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-modal')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span style="font-weight:700;">PAGAMENTO</span>
            <div></div>
        </div>
        <div class="tap-instruction">
            <div id="valorAproximar" style="font-size: 38px; font-weight: 800;">R$ 0,00</div>
            <svg class="maquininha-svg" viewBox="0 0 200 200">
                <rect x="60" y="70" width="80" height="110" rx="10" fill="#E5E7EB"/>
                <rect x="70" y="80" width="60" height="35" rx="4" fill="#1A1D23"/>
                <g>
                    <path d="M130 50 L170 30 L180 50 L140 70 Z" fill="#22c55e" /> 
                    <path d="M150 40 Q 180 30, 190 60" stroke="#1A1D23" stroke-width="8" stroke-linecap="round" fill="none"/> 
                    <animateTransform attributeName="transform" type="translate" values="0,0; -15,15; 0,0" dur="1.2s" repeatCount="indefinite" />
                </g>
            </svg>
            <p style="font-weight: 700;">Aproxime o cartão</p>
        </div>
        <div style="padding: 20px;">
            <button class="btn-confirm active" onclick="finalizarVenda()">PAGAMENTO REALIZADO</button>
        </div>
    </div>

    <div id="screen-sucesso" class="screen">
        <div class="success-box">
            <div class="success-icon">✓</div>
            <h2 style="font-weight: 800;">APROVADO!</h2>
            <div class="valor-gigante" id="valorSucesso">R$ 0,00</div>
            
            <button class="btn-confirm active" style="margin-top: 20px;" onclick="location.reload()">NOVA VENDA</button>
            <button class="btn-confirm active" style="margin-top: 12px; background: #fff; border: 1px solid var(--border);" onclick="nav('screen-dash')">IR PARA O INÍCIO</button>
        </div>
    </div>

    <script>
        let valorString = "";
        let metodoSelecionado = "";

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function press(n) {
            if (valorString.length >= 8) return;
            valorString += n;
            atualizarDisplay();
        }

        function limpar() {
            valorString = valorString.slice(0, -1);
            atualizarDisplay();
        }

        function atualizarDisplay() {
            let num = parseFloat(valorString || 0) / 100;
            let formatado = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('display').innerText = formatado;
            document.getElementById('btnProximo').classList.toggle('active', num > 0);
        }

        function confirmarValor() {
            let num = parseFloat(valorString) / 100;
            let formatado = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('valorFinal').innerText = formatado;
            document.getElementById('valorAproximar').innerText = formatado;
            document.getElementById('valorSucesso').innerText = formatado;
            nav('screen-modal');
        }

        function prepararVenda(metodo) {
            metodoSelecionado = metodo;
            if(metodo === 'Pix') finalizarVenda();
            else nav('screen-aproximar');
        }

        function finalizarVenda() {
            nav('screen-sucesso');
        }
    </script>
</body>
    </html>

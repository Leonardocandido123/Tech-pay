
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empréstimo TechPay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#22c55e;
  --bg:#000;
  --card:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#9CA3AF;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:#fff;
}

.container { padding:20px; }

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.badge {
  background: rgba(34,197,94,0.15);
  color: var(--primary);
  padding:6px 12px;
  border-radius:10px;
  font-size:11px;
  font-weight:700;
}

/* SCORE */
.score-card {
  background: linear-gradient(135deg,#111827,#020617);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  margin-bottom:20px;
}

.score-value {
  font-size:26px;
  font-weight:800;
  color: var(--primary);
}

/* LIMITE */
.limit-card {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
}

.limit-card h2 {
  margin:10px 0;
  font-size:28px;
}

/* RANGE */
input[type=range] {
  width:100%;
}

/* INFO */
.info-card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  margin-bottom:20px;
}

.row {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:13px;
}

.row span { color:var(--text); }

/* BOTÕES */
.btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-weight:800;
  margin-top:10px;
}

.primary {
  background: var(--primary);
  color:#000;
}

.secondary {
  background: transparent;
  border:1px solid var(--border);
  color:#fff;
}

/* HISTÓRICO */
.history-card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
}

.history-item {
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <h2>Empréstimo</h2>
  <span class="badge">IA ativa</span>
</div>

<!-- SCORE -->
<div class="score-card">
  <span>Score TechPay</span>
  <div class="score-value" id="score">750</div>
</div>

<!-- LIMITE -->
<div class="limit-card">
  <small>Limite disponível</small>
  <h2 id="limite">R$ 2.000</h2>
  <input type="range" min="100" max="5000" step="100" value="1000" id="range">
</div>

<!-- INFO -->
<div class="info-card">
  <div class="row"><span>Parcelas</span><b>12x</b></div>
  <div class="row"><span>Taxa</span><b id="taxa">2.9%</b></div>
  <div class="row"><span>Total</span><b id="total">R$ 1.300</b></div>
</div>

<button class="btn primary" onclick="contratar()">Contratar empréstimo</button>
<button class="btn secondary" onclick="aumentarLimite()">Aumentar limite</button>

<!-- HISTÓRICO -->
<div class="history-card">
  <b>Histórico</b>

  <div id="historico"></div>
</div>

</div>

<script>

// ============================
// IA DE SCORE BASEADO NO USO
// ============================
function calcularScore() {
  const transacoes = JSON.parse(localStorage.getItem("transacoes") || "[]");
  let score = 500;

  transacoes.forEach(t => {
    if(t.tipo === "entrada") score += 5;
    if(t.tipo === "saida") score += 2;
  });

  if(score > 950) score = 950;

  document.getElementById("score").innerText = score;
  return score;
}

// ============================
// LIMITE INTELIGENTE
// ============================
function calcularLimite(score) {
  let limite = score * 5;
  document.getElementById("limite").innerText =
    limite.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

// ============================
// SIMULAÇÃO
// ============================
const range = document.getElementById("range");
const total = document.getElementById("total");
const taxaEl = document.getElementById("taxa");

range.oninput = () => {
  let v = parseInt(range.value);
  let taxa = 0.03;
  let totalCalc = v + (v * taxa * 12);

  total.innerText = totalCalc.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
};

// ============================
// CONTRATAR
// ============================
function contratar() {
  let valor = range.value;

  let historico = JSON.parse(localStorage.getItem("emprestimos") || "[]");

  historico.push({
    valor: valor,
    data: new Date().toLocaleDateString()
  });

  localStorage.setItem("emprestimos", JSON.stringify(historico));

  alert("💰 Empréstimo aprovado!");
  renderHistorico();
}

// ============================
// HISTÓRICO
// ============================
function renderHistorico() {
  const lista = JSON.parse(localStorage.getItem("emprestimos") || "[]");
  const container = document.getElementById("historico");

  container.innerHTML = lista.map(item => `
    <div class="history-item">
      <span>${item.data}</span>
      <b>R$ ${item.valor}</b>
    </div>
  `).join('');
}

// ============================
// AUMENTAR LIMITE (IA)
// ============================
function aumentarLimite() {
  alert("🚀 Limite reavaliado com IA TechPay");
}

// INIT
let score = calcularScore();
calcularLimite(score);
renderHistorico();

</script>

</body>
</html>

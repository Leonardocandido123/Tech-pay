<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Meus Dados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            /* Fundo gradiente igual ao perfil */
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            padding: 25px;
            max-width: 450px;
            margin: auto;
        }

        /* Botão Voltar */
        .back-nav {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: var(--card-bg);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        /* Título em Verde Zentry */
        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            letter-spacing: -1px; 
            color: var(--primary); /* Texto em verde conforme pedido */
        }

        .data-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-item label {
            font-size: 11px;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .data-item span {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .info-footer {
            margin-top: 30px;
            padding: 20px;
            background: rgba(34, 197, 94, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(34, 197, 94, 0.1);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .info-footer svg {
            color: var(--primary);
            flex-shrink: 0;
        }

        .info-footer p {
            margin: 0;
            font-size: 12px;
            color: var(--text-sec);
            line-height: 1.5;
        }

        .info-footer b {
            color: var(--primary);
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="perfil.html" class="back-nav">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>

    <h1>Meus Dados</h1>

    <div class="data-group">
        <div class="data-item">
            <label>Nome Completo</label>
            <span id="display-nome">Leonardo Silva</span>
        </div>

        <div class="data-item">
            <label>CPF</label>
            <span>***.458.963-**</span>
        </div>

        <div class="data-item">
            <label>E-mail</label>
            <span>leo.zentry@email.com</span>
        </div>

        <div class="data-item">
            <label>Telefone</label>
            <span>(11) 9****-4521</span>
        </div>
    </div>

    <div class="info-footer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <div>
            <b>Segurança Zentry</b>
            <p>Seus dados são criptografados. Para alterações, fale com o suporte.</p>
        </div>
    </div>
</div>

<script>
    // Carregar nome dinâmico
    window.onload = () => {
        const nome = localStorage.getItem("nome") || "Leonardo Silva";
        document.getElementById("display-nome").innerText = nome;
    }
</script>

</body>
</html>

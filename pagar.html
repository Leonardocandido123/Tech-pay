<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentry - Pagar</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.header {
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

#reader {
  width:100%;
  margin-top:20px;
}

.status {
  margin-top:15px;
  font-size:14px;
  color:#22C55E;
}

button {
  margin-top:20px;
  padding:15px;
  background:#22C55E;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Pagar com QR</div>

<button onclick="iniciarScanner()">Abrir câmera</button>

<div id="reader"></div>
<div class="status" id="status">Aguardando...</div>

<script>
const status = document.getElementById("status");
let scanner = null;

async function iniciarScanner() {
  try {
    status.innerText = "Solicitando permissão...";

    // 🔥 força abrir câmera
    await navigator.mediaDevices.getUserMedia({ video: true });

    status.innerText = "Câmera liberada ✅";

    scanner = new Html5Qrcode("reader");
    const devices = await Html5Qrcode.getCameras();

    if (!devices.length) {
      status.innerText = "Nenhuma câmera encontrada ❌";
      return;
    }

    status.innerText = "Escaneando...";

    scanner.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },

      (decodedText) => {
        status.innerText = "QR detectado ✅";

        alert("QR: " + decodedText);

        scanner.stop();
      }
    );

  } catch (err) {
    status.innerText = "Erro ao abrir câmera ❌";
    alert("Erro: " + err);
  }
}
</script>

</body>
</html>

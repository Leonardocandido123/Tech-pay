
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>TECH Pay - Cobrar</title>
  <style>
    :root { --primary: #22C55E; --bg: #000000; --card: #121826; --border: #2A3441; --text-sec: #9CA3AF; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; }

    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
    .back-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
    
    .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 25px; text-align: center; }
    .label { color: var(--text-sec); font-size: 13px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 15px; }
    
    .value-input { background: transparent; border: none; color: white; font-size: 42px; font-weight: 700; width: 100%; text-align: center; outline: none; margin-bottom: 10px; }
    .value-input::placeholder { color: #1F2937; }

    .desc-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; padding: 15px; margin-top: 20px; width: 100%; color: white; font-family: 'Inter'; outline: none; }

    /* QR CODE AREA */
    #qr-result { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
    .qr-frame { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
    .qr-mock { width: 180px; height: 180px; background: #000; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; }

    .btn-primary { background: var(--primary); color: #000; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px; margin-top: 25px; cursor: pointer; transition: 0.2s; }
    .btn-primary:active { transform: scale(0.96); }
    
    .btn-share { background: #1F2937; color: white; border: 1px solid var(--border); width: 100%; padding: 15px; border-radius: 18px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <h2 style="margin:0; font-size: 20px;">Cobrar Cliente</h2>
  </div>

  <div class="main-card">
    <span class="label">Quanto você quer receber?</span>
    <input type="text" id="valor-cobrar" class="value-input" placeholder="R$ 0,00">
    
    <input type="text" id="descricao" class="desc-box" placeholder="Para que é essa cobrança? (Opcional)">

    <div id="qr-result">
        <div class="qr-frame">
            <div class="qr-mock">
                <svg width="150" height="150" viewBox="0 0 24 24" fill="black"><path d="M3 11V3h8v8H3zm0 10v-8h8v8H3zM13 3h8v8h-8V3zm0 10h8v8h-8v-8zm2 2h4v4h-4v-4z"/></svg>
            </div>
        </div>
        <p style="font-size: 13px; color: var(--text-sec);">QR Code gerado com sucesso!</p>
        
        <button class="btn-share" onclick="compartilharCobrança()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
            Compartilhar Link Pix
        </button>
    </div>

    <button id="btn-gerar" class="btn-primary" onclick="gerarCobranca()">Gerar QR Code</button>
  </div>

  <script>
    // Máscara de Moeda
    document.getElementById('valor-cobrar').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g,'');
      v = (v/100).toFixed(2) + '';
      v = v.replace(".", ",");
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      e.target.value = "R$ " + v;
    });

    function gerarCobranca() {
        const valor = document.getElementById('valor-cobrar').value;
        if(valor === "" || valor === "R$ 0,00") return alert("Digite um valor!");

        document.getElementById('btn-gerar').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
    }
    // Máscara de Moeda (Mantive a sua que está ótima)
    document.getElementById('valor-cobrar').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g,'');
      v = (v/100).toFixed(2) + '';
      v = v.replace(".", ",");
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      e.target.value = "R$ " + v;
    });

    function gerarCobranca() {
        const valor = document.getElementById('valor-cobrar').value;
        if(valor === "" || valor === "R$ 0,00") return alert("Digite um valor!");

        document.getElementById('btn-gerar').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
    }

    // NOVA FUNÇÃO DE COMPARTILHAR (Muito mais estável)
    async function compartilharCobrança() {
        const valor = document.getElementById('valor-cobrar').value;
        const desc = document.getElementById('descricao').value || "Serviço";
        const textoLink = `Olá! Segue meu Pix de ${valor} referente a: ${desc}. TechPay agradece!`;

        // Tenta usar o compartilhamento nativo do celular
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Cobrança TechPay',
                    text: textoLink,
                    url: '#', // Aqui você poderia colocar o link do QR Code se tivesse um servidor
                });
            } catch (err) {
                // Se o usuário cancelar, não faz nada e a tela não some
            }
        } else {
            // Caso o navegador não suporte (PC antigo), ele usa o Zap direto
            window.open(`https://wa.me/?text=${encodeURIComponent(textoLink)}`, '_blank');
        }
    }

  </script>
</body>
</html>

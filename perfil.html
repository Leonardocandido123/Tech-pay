<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root { 
    --primary: #22c55e; 
    --bg-card: #111827;
    --border: rgba(255,255,255,0.1);
    --text-secondary: #9CA3AF;
}

body {
    margin:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
    color:#fff;
}

.container {
    padding:20px;
    max-width:450px;
    margin:auto;
}

/* VOLTAR */
.back-nav {
    display:flex;
    gap:10px;
    margin-bottom:20px;
    text-decoration:none;
    color:#fff;
}

/* HEADER */
.profile-header {
    text-align:center;
    margin-bottom:30px;
}

.avatar {
    width:100px;
    height:100px;
    border-radius:50%;
    background:var(--bg-card);
    border:2px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

/* MENU */
.section {
    background:var(--bg-card);
    border-radius:20px;
    border:1px solid var(--border);
    overflow:hidden;
    margin-bottom:20px;
}

.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    border-bottom:1px solid var(--border);
    text-decoration:none;
    color:#fff;
}

.item:last-child { border:none; }

.item:active {
    transform:scale(0.97);
    background:rgba(255,255,255,0.05);
}

.text b { font-size:14px; }
.text span { font-size:11px; color:var(--text-secondary); }

/* BOTÃO */
.logout {
    width:100%;
    padding:16px;
    border-radius:15px;
    border:1px solid #ef4444;
    background:transparent;
    color:#ef4444;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<a href="home.html" class="back-nav">← Voltar</a>

<div class="profile-header">
    <div class="avatar">👤</div>
    <h2 id="nomeUser">Carregando...</h2>
</div>

<!-- DADOS -->
<div class="section">
    <div class="item">
        <div class="text">
            <b>Meus Dados</b>
            <span>Nome e informações</span>
        </div>
    </div>

    <div class="item">
        <div class="text">
            <b>Chaves Pix</b>
            <span>Gerenciar recebimentos</span>
        </div>
    </div>
</div>

<!-- ACESSO -->
<div class="section">
    <a href="config.html" class="item">
        <div class="text">
            <b>Ajustes</b>
            <span>Configurações do app</span>
        </div>
        ➜
    </a>

    <div class="item">
        <div class="text">
            <b>Ajuda</b>
            <span>Suporte TechPay</span>
        </div>
    </div>
</div>

<button class="logout" onclick="logout()">Sair da conta</button>

</div>

<script>
function carregar(){
    const nome = localStorage.getItem("nome") || "Leonardo";
    document.getElementById("nomeUser").innerText = nome;
}

function logout(){
    localStorage.setItem("techpay_user","false");
    window.location.href="login.html";
}

carregar();
</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div id="reader" style="width:300px"></div>

<script>
const qr = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras => {
  if (!cameras.length) {
    alert("Sem câmera");
    return;
  }

  qr.start(
    cameras[0].id,
    { fps: 10, qrbox: 250 },
    (text) => alert("Leu: " + text)
  );
});
</script>

</body>
</html>

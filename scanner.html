<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentry - Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarQR = async (dados) => {
  const docRef = await addDoc(collection(db, "pix_temp"), {
    ...dados,
    criadoEm: Date.now()
  });

  // 🔥 salva ID pra próxima tela
  localStorage.setItem("pixID", docRef.id);

  window.location.href = "qrcode.html";
};
</script>

<style>
body { background:#000; color:#fff; text-align:center; }
#reader { width:100%; margin-top:20px; }
</style>
</head>

<body>

<h2>Escaneie o QR Code</h2>
<div id="reader"></div>

<script>
async function iniciar() {
  await navigator.mediaDevices.getUserMedia({ video: true });

  const html5QrCode = new Html5Qrcode("reader");
  const devices = await Html5Qrcode.getCameras();

  html5QrCode.start(
    devices[0].id,
    { fps: 10, qrbox: 250 },

    (decodedText) => {
      try {
        const dados = JSON.parse(decodedText);

        html5QrCode.stop();

        // envia pro Firebase
        window.salvarQR(dados);

      } catch {
        alert("QR inválido");
      }
    }
  );
}

iniciar();
</script>

</body>
</html>

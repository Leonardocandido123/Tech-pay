<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRY - Pagar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }

* { box-sizing:border-box; font-family:'Inter'; }

body {
  margin:0;
  background:var(--bg);
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn {
  background:var(--card);
  border:none;
  padding:10px;
  border-radius:50%;
  color:white;
}

/* SCANNER */
.scanner-container {
  height:280px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}

#reader {
  width:100%;
  height:100%;
}

#reader video {
  object-fit:cover;
}

/* LINHA */
.scan-line {
  position:absolute;
  width:90%;
  height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  animation:scan 2s infinite;
}

@keyframes scan {
  0% { top:10%; }
  100% { top:90%; }
}

/* TEXTO */
.status {
  text-align:center;
  color:var(--primary);
  font-size:13px;
}

/* BOTÃO */
.option {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div>

<div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div>

<div class="status" id="status">Aponte para QR Code ou Código de Barras</div>

<div class="option" onclick="modoManual()">
  Digitar código manualmente
</div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...", 
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275",
  storageBucket: "zentry-app-74275.appspot.com",
  messagingSenderId: "571422826071",
  appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let qrScanner = null;
let jaLeu = false;
let cameraIniciada = false;

/* =========================
   🛡️ LOGIN COM PROTEÇÃO ULTRA
========================= */
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("Usuário detectado:", user.uid);
    userLogado = user;
    
    // Garantir que o DOM está pronto antes de chamar a câmera
    if (document.readyState === "complete") {
        executarInicio();
    } else {
        window.addEventListener("load", executarInicio);
    }
  } else {
    // Aumentamos o tempo para 4 segundos para dar tempo do hardware responder
    setTimeout(() => {
        if (!auth.currentUser) {
            location.href = "login.html";
        }
    }, 4000);
  }
});

function executarInicio() {
    if(!cameraIniciada) iniciarQR();
}

/* =========================
   🔳 QR CODE (RESOLVENDO TELA PRETA)
========================= */
async function iniciarQR(){
  if(cameraIniciada) return;
  
  const readerElement = document.getElementById("reader");
  if(!readerElement) return;

  qrScanner = new Html5Qrcode("reader");
  cameraIniciada = true;

  const config = { 
    fps: 15, 
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0 
  };

  try {
    // Tenta forçar a câmera traseira de forma explícita
    await qrScanner.start(
      { facingMode: "environment" },
      config,
      (text) => {
        if (jaLeu) return;
        jaLeu = true;
        vibrar();
        qrScanner.stop();
        document.getElementById("status").innerText = "Detectado! ✔";
        processar(text);
      }
    );
    document.getElementById("status").innerText = "Câmera iniciada. Aponte para o código.";
  } catch (err) {
    console.error("Falha na câmera:", err);
    document.getElementById("status").innerText = "Erro na câmera. Tentando modo barras...";
    cameraIniciada = false;
    // Se o QR falhar, tenta o Quagga como plano B
    setTimeout(iniciarBarras, 1000);
  }
}

/* =========================
   📊 CÓDIGO DE BARRAS
========================= */
function iniciarBarras(){
  if(cameraIniciada) return;
  cameraIniciada = true;

  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: "#reader",
      constraints: { 
        facingMode: "environment",
        width: {ideal: 640},
        height: {ideal: 480}
      }
    },
    decoder: {
      readers: ["i2of5_reader", "code_128_reader", "ean_reader"]
    }
  }, (err) => {
    if (err) {
        document.getElementById("status").innerText = "Erro fatal de hardware.";
        cameraIniciada = false;
        return;
    }
    Quagga.start();
  });

  Quagga.onDetected((res) => {
    if (jaLeu) return;
    jaLeu = true;
    vibrar();
    Quagga.stop();
    processar(res.codeResult.code);
  });
}

// ... (Função processar e vibrar permanecem iguais) ...
async function processar(codigoLido){
  try {
    let valorPrompt = prompt("Valor do pagamento:");
    if (!valorPrompt) { location.reload(); return; }
    const valorNum = parseFloat(valorPrompt.replace(".", "").replace(",", "."));
    
    const userRef = doc(db, "usuarios", userLogado.uid);
    const snap = await getDoc(userRef);
    const saldo = snap.data().saldo || 0;

    if (saldo < valorNum) {
        alert("Saldo insuficiente!");
        location.reload();
        return;
    }

    await updateDoc(userRef, { saldo: increment(-valorNum) });
    localStorage.setItem("transacao", JSON.stringify({
        valor: valorNum,
        data: new Date().toLocaleString()
    }));
    location.href = "comprovante.html";
  } catch (e) { location.reload(); }
}

function vibrar(){ if(navigator.vibrate) navigator.vibrate(150); }
window.modoManual = () => processar("MANUAL");
</script>
  
  
</body>
</html>

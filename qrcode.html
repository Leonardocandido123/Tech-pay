<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRY - Pagar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }
* { box-sizing:border-box; font-family:'Inter'; }

body { margin:0; background:var(--bg); color:white; }

.header { padding:20px; display:flex; align-items:center; gap:15px; }
.back-btn { background:var(--card); border:none; padding:10px; border-radius:50%; color:white; }

/* SCANNER */
.scanner-container {
  height:320px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:2px solid var(--border);
  background:#000;
}

#reader {
  width:100%;
  height:100%;
  position:relative;
}

#reader video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LINHA PERFEITAMENTE CENTRAL */
.scan-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  z-index:10;
  animation: scan 2.5s infinite ease-in-out;
}

@keyframes scan {
  0% { top: 10%; }
  50% { top: 90%; }
  100% { top: 10%; }
}

.status {
  text-align:center;
  color:var(--primary);
  font-size:13px;
  margin:10px;
}

.option {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div>

<div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div>

<div class="status" id="status">Carregando câmera...</div>

<div class="option" onclick="modoManual()">
  Digitar código manualmente
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY_AQUI",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let html5QrCode = null;
let jaLeu = false;

/* LOGIN SEGURO (SEM BUG DE LOOP) */
onAuthStateChanged(auth, async (user) => {
  const status = document.getElementById("status");

  if (!user) {
    status.innerText = "Sessão expirada...";
    setTimeout(() => window.location.href = "login.html", 1500);
    return;
  }

  userLogado = user;
  status.innerText = "Abrindo câmera...";

  iniciarScanner();
});

async function iniciarScanner() {
  const status = document.getElementById("status");

  try {
    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 15,
        qrbox: { width: 250, height: 250 }
      },
      (text) => {
        if (jaLeu) return;
        jaLeu = true;

        navigator.vibrate?.(150);

        html5QrCode.stop();

        status.innerText = "Código lido ✔";
        processarPagamento(text);
      }
    );

    status.innerText = "Aponte para o QR Code";

    /* CORREÇÃO MOBILE (ANDROID) */
    setTimeout(() => {
      const video = document.querySelector("#reader video");
      if (video) {
        video.setAttribute("playsinline", true);
        video.muted = true;
        video.play().catch(()=>{});
      }
    }, 500);

  } catch (err) {
    console.error(err);
    status.innerText = "Erro na câmera. Permita o acesso.";
  }
}

async function processarPagamento(codigo) {
  try {
    let valor = prompt("Digite o valor:");

    if (!valor) return location.reload();

    valor = parseFloat(valor.replace(",", "."));

    if (!valor || valor <= 0) {
      alert("Valor inválido");
      return location.reload();
    }

    const ref = doc(db, "usuarios", userLogado.uid);
    const snap = await getDoc(ref);

    const saldo = snap.data()?.saldo || 0;

    if (saldo < valor) {
      alert("Saldo insuficiente");
      return location.reload();
    }

    await updateDoc(ref, { saldo: increment(-valor) });

    localStorage.setItem("transacao", JSON.stringify({
      valor,
      data: new Date().toLocaleString(),
      codigo
    }));

    window.location.href = "comprovante.html";

  } catch {
    alert("Erro no pagamento");
    location.reload();
  }
}

window.modoManual = () => processarPagamento("manual");

</script>
</body>
</html>

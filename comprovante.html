<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<title>Comprovante - ZENTRY</title>
<style>
:root{
  --bg: radial-gradient(circle at 20% 0%, #0f172a, #000 70%);
  --card: rgba(18,24,38,0.95);
  --green:#22C55E;
  --text-muted: #94a3b8;
}
body {
  margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:#fff;
  display:flex; flex-direction:column; align-items:center; padding:20px; min-height: 100vh;
}
.card{
  width:100%; max-width:420px; border-radius:28px; padding:30px 20px;
  backdrop-filter:blur(20px); background:var(--card); border: 1px solid rgba(255,255,255,0.05);
}
.check{ width:60px; height:60px; margin:0 auto 15px; }
circle{ fill:none; stroke:var(--green); stroke-width:2; stroke-dasharray:200; stroke-dashoffset:200; animation:circle 0.6s forwards;}
path{ fill:none; stroke:var(--green); stroke-width:3; stroke-dasharray:50; stroke-dashoffset:50; animation:check 0.4s 0.6s forwards;}
@keyframes circle{to{stroke-dashoffset:0}}
@keyframes check{to{stroke-dashoffset:0}}

.valor{ font-size:32px; font-weight:800; text-align:center; margin-bottom: 5px; letter-spacing: -1px;}
.status{ text-align:center; color:var(--green); margin-bottom:30px; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}

.secao-titulo { 
    font-size: 12px; font-weight: 700; color: var(--text-muted); 
    text-transform: uppercase; margin: 20px 0 10px; padding-bottom: 5px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.linha{ display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;}
.linha span:first-child { color: var(--text-muted); }
.linha span:last-child { font-weight: 600; text-align: right; max-width: 65%; color: #fff; }

.footer-contato {
    margin-top: 25px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1);
    text-align: center; font-size: 12px; color: var(--text-muted); line-height: 1.6;
}

.actions{ margin-top:20px; display:flex; flex-direction:column; gap:10px; width: 100%; max-width: 420px;}
button{ padding:16px; border-radius:16px; border:none; font-weight:700; font-size: 15px; cursor: pointer;}
.primary{ background:var(--green); color:#000;}
.secondary{ background:rgba(255,255,255,0.05); color:#fff; border: 1px solid rgba(255,255,255,0.1);}

/* Export Mode */
.export-mode { background: #fff !important; }
.export-mode .card { background:#fff !important; color:#000 !important; border:1px solid #eee !important; }
.export-mode .linha span:first-child, .export-mode .secao-titulo, .export-mode .footer-contato { color: #666 !important; }
.export-mode .linha span:last-child { color: #000 !important; }
.export-mode .secao-titulo { border-bottom-color: #eee !important; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="check">
    <svg viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="25"/>
      <path d="M14 27 L22 34 L38 18"/>
    </svg>
  </div>

  <div class="valor" id="txtValor">R$ 0,00</div>
  <div class="status" id="txtStatus">Transação Realizada</div>

  <div id="conteudo">
      </div>

  <div class="footer-contato">
      Em caso de dúvidas, entre em contato com a <b>Zentry</b> através do nosso chat no app ou e-mail: <b>suporte@zentry.com</b>
  </div>
</div>

<div class="actions">
    <button class="primary" onclick="compartilhar()">Compartilhar Comprovante</button>
    <button class="secondary" onclick="voltar()">Voltar ao Início</button>
</div>
  <script>
// 1. Tenta pegar o ativo (extrato) ou o final (revisão)
// Importante: a ordem aqui garante que o clique no extrato tenha prioridade
const dados = JSON.parse(localStorage.getItem("comprovante_ativo")) || 
              JSON.parse(localStorage.getItem("comprovante_final")) || null;

function inicializar() {
    if (!dados || (!dados.valor && !dados.valorNumerico)) {
        document.body.innerHTML = `
            <div style='padding:50px; text-align:center;'>
                <h2>Comprovante não encontrado</h2>
                <button onclick="voltar()" class="secondary">Voltar</button>
            </div>`;
        return;
    }

    // Trata o valor: se for número vindo do banco, formata. Se for string (R$), mantém.
    let valorExibir = dados.valor;
    if (typeof dados.valor === 'number') {
        valorExibir = dados.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    document.getElementById("txtValor").innerText = valorExibir;
    
    // Define o Título baseado no tipo ou no sinal
    const labels = { pix: "Pix Enviado", recarga: "Recarga realizada", entrada: "Pix Recebido", saida: "Pix Enviado" };
    document.getElementById("txtStatus").innerText = labels[dados.tipo] || "Transferência Realizada";

    let html = "";
    
    // --- SEÇÃO DADOS DA TRANSAÇÃO ---
    html += `<div class="secao-titulo">Dados da Transação</div>`;
    html += `<div class="linha"><span>Valor</span><span>${valorExibir}</span></div>`;
    html += `<div class="linha"><span>Data e Hora</span><span>${dados.data || new Date().toLocaleString()}</span></div>`;
    html += `<div class="linha"><span>ID da Transação</span><span>${dados.id || 'ZNT-S/N'}</span></div>`;

    // --- SEÇÃO DESTINO ---
    html += `<div class="secao-titulo">Destino</div>`;
    // Se eu recebi o dinheiro, o "Destino" sou eu (Remetente no banco)
    const nomeDestino = (dados.uidDestino === "externo" || dados.tipo === "saida") ? (dados.nomeDestino || "---") : (dados.nomeRemetente || "Eu");
    html += `<div class="linha"><span>Nome</span><span>${nomeDestino}</span></div>`;
    if(dados.chavePix) html += `<div class="linha"><span>Chave Pix</span><span>${dados.chavePix}</span></div>`;
    html += `<div class="linha"><span>Instituição</span><span>${dados.bancoDestino || 'Zentry Bank'}</span></div>`;

    // --- SEÇÃO ORIGEM ---
    html += `<div class="secao-titulo">Origem</div>`;
    // Se eu enviei, a origem sou eu. Se recebi, a origem é o nomeRemetente.
    const nomeOrigem = (dados.uidDestino === "externo" || dados.tipo === "saida") ? (dados.nomeRemetente || "Minha Conta") : (dados.nomeDestino || "Outro Usuário");
    html += `<div class="linha"><span>Nome</span><span>${nomeOrigem}</span></div>`;
    html += `<div class="linha"><span>Instituição</span><span>ZENTRY</span></div>`;
    html += `<div class="linha"><span>CNPJ</span><span>98.768.908/0001-01</span></div>`;

    document.getElementById("conteudo").innerHTML = html;
}

async function compartilhar() {
    const card = document.getElementById("card");
    document.body.classList.add("export-mode");
    
    try {
        const canvas = await html2canvas(card, { scale: 3, backgroundColor: "#ffffff" });
        document.body.classList.remove("export-mode");
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], "comprovante_zentry.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Comprovante Zentry' });
        } else {
            const link = document.createElement("a");
            link.download = "comprovante_zentry.png";
            link.href = canvas.toDataURL();
            link.click();
        }
    } catch (err) {
        document.body.classList.remove("export-mode");
    }
}

// Quando voltar, limpa o cache do comprovante ativo para não bugar o extrato
function voltar() { 
    localStorage.removeItem("comprovante_ativo");
    window.location.href = 'home.html'; 
}

inicializar();
  </script>
  
  

</body>
</html>
